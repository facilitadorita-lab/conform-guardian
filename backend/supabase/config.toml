project_id = "conform-flow"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "20MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/**"]
enable_signup = false

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.invite-company-user]
verify_jwt = true

[functions.create-evidence-upload]
verify_jwt = true

[functions.dispatch-expiration-alerts]
verify_jwt = false

[functions.asaas-webhook]
verify_jwt = false

[functions.create-asaas-subscription]
verify_jwt = true

[functions.assistant-query]
verify_jwt = true

[functions.create-test-profiles]
verify_jwt = true
